<style>
  :root {
    color-scheme: dark;
    --bg: #15110e;
    --bg-2: #211814;
    --panel: #282019;
    --panel-2: #33271f;
    --paper: #f4ead7;
    --text: #f8efe0;
    --muted: #c3b39d;
    --line: rgba(203, 166, 98, 0.28);
    --brass: #cba662;
    --brass-soft: #ead3a2;
    --green: #183f35;
    --wine: #7c3b35;
    --shadow: 0 22px 54px rgba(0, 0, 0, 0.38);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 22% 0%, rgba(203, 166, 98, 0.16), transparent 34%),
      linear-gradient(180deg, #0f0c0a 0%, var(--bg) 42%, #1b1410 100%);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 84px),
      linear-gradient(90deg, rgba(0, 0, 0, 0.22), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.22));
  }

  button {
    border: 1px solid var(--line);
    background: rgba(244, 234, 215, 0.08);
    color: var(--text);
    border-radius: 6px;
    padding: 10px 14px;
    font: inherit;
    cursor: pointer;
    transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
  }

  button.primary {
    background: linear-gradient(180deg, #d8b76f, #a77b34);
    border-color: rgba(234, 211, 162, 0.9);
    color: #18110d;
    font-weight: 700;
    box-shadow: 0 12px 26px rgba(203, 166, 98, 0.24);
  }

  button:not(:disabled):hover {
    transform: translateY(-1px);
    border-color: rgba(234, 211, 162, 0.78);
    background: rgba(244, 234, 215, 0.12);
  }

  button.primary:not(:disabled):hover {
    background: linear-gradient(180deg, #e5c982, #b98b3e);
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.62;
  }

  .hero {
    position: relative;
    min-height: 330px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    padding: 42px clamp(18px, 5vw, 72px);
    overflow: hidden;
    background:
      linear-gradient(135deg, rgba(18, 13, 10, 0.96), rgba(45, 31, 24, 0.92)),
      linear-gradient(90deg, #221711, #453024);
    border-bottom: 1px solid rgba(203, 166, 98, 0.38);
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
  }

  .hero::after {
    content: "";
    position: absolute;
    inset: auto 0 0;
    height: 12px;
    background: linear-gradient(90deg, transparent, rgba(203, 166, 98, 0.78), transparent);
    opacity: 0.72;
  }

  .hero-copy {
    position: relative;
    z-index: 1;
    max-width: 650px;
  }

  .eyebrow,
  .section-kicker {
    margin: 0;
    color: var(--brass-soft);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 14px;
    font-family: Georgia, "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", serif;
    font-size: clamp(42px, 7vw, 78px);
    font-weight: 700;
    line-height: 0.98;
  }

  h2 {
    margin-bottom: 0;
    font-size: 22px;
  }

  .lead {
    max-width: 540px;
    margin-bottom: 24px;
    color: rgba(248, 239, 224, 0.76);
    font-size: 15px;
    line-height: 1.85;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .shelf-visual {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 10px;
    min-width: min(34vw, 340px);
    height: 202px;
    padding: 0 28px 25px;
    border-bottom: 12px solid rgba(203, 166, 98, 0.76);
  }

  .book,
  .vase {
    display: block;
    border: 1px solid rgba(248, 239, 224, 0.14);
    box-shadow: 0 18px 24px rgba(0, 0, 0, 0.34);
  }

  .book {
    width: 38px;
    height: 146px;
    border-radius: 4px 4px 2px 2px;
    background: linear-gradient(90deg, #5c2a26, #9a4a3f 44%, #4a201d);
  }

  .book.tall {
    height: 174px;
    background: linear-gradient(90deg, #102b26, #2e6254 46%, #0b211d);
  }

  .book.brass {
    height: 136px;
    background: linear-gradient(90deg, #806027, #c49c4d 48%, #6d4f20);
  }

  .book.slim {
    width: 24px;
    height: 158px;
    background: linear-gradient(90deg, #1a2436, #3f5776 48%, #111b2d);
  }

  .book.wide {
    width: 52px;
    height: 122px;
    background: linear-gradient(90deg, #43271b, #774a31 48%, #2f1b13);
  }

  .vase {
    width: 54px;
    height: 84px;
    border-radius: 28px 28px 18px 18px;
    background: linear-gradient(135deg, #ead8b4, #a88d53);
  }

  .layout {
    position: relative;
    z-index: 1;
    max-width: 1120px;
    margin: 0 auto;
    padding: 26px 18px 44px;
  }

  .module-list {
    padding: 8px 0 0;
  }

  .section-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }

  .section-kicker {
    margin-bottom: 5px;
  }

  .section-note {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
    gap: 16px;
  }

  .module-card {
    position: relative;
    display: grid;
    grid-template-columns: 58px minmax(0, 1fr);
    gap: 14px;
    width: 100%;
    min-height: 148px;
    margin: 0;
    padding: 18px;
    align-items: center;
    text-align: left;
    border-color: rgba(203, 166, 98, 0.34);
    background:
      linear-gradient(180deg, rgba(55, 42, 33, 0.94), rgba(36, 28, 22, 0.96)),
      var(--panel);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .module-card::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: linear-gradient(180deg, var(--wine), rgba(124, 59, 53, 0.28));
    opacity: 0.78;
  }

  .module-card:not(.disabled):hover {
    border-color: rgba(234, 211, 162, 0.82);
    background:
      linear-gradient(180deg, rgba(67, 51, 39, 0.98), rgba(40, 31, 24, 0.98)),
      var(--panel-2);
    box-shadow: 0 26px 58px rgba(0, 0, 0, 0.46);
  }

  .module-card:not(.disabled):hover::before {
    background: linear-gradient(180deg, #a55449, var(--brass));
    opacity: 1;
  }

  .module-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 58px;
    height: 74px;
    border-radius: 6px 6px 4px 4px;
    background: linear-gradient(160deg, var(--green), #275b50);
    color: var(--paper);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 15px;
    font-weight: 800;
    box-shadow: inset 6px 0 rgba(255, 255, 255, 0.08), inset -6px 0 rgba(0, 0, 0, 0.18);
  }

  .module-body {
    display: grid;
    gap: 8px;
    min-width: 0;
  }

  .module-body strong {
    overflow-wrap: anywhere;
    color: var(--text);
    font-size: 18px;
    letter-spacing: 0;
  }

  .module-body span,
  .module-body em,
  .muted {
    color: var(--muted);
    font-size: 13px;
    font-style: normal;
    line-height: 1.55;
  }

  .module-body em {
    color: var(--brass-soft);
    font-weight: 700;
  }

  @media (max-width: 640px) {
    .hero {
      min-height: auto;
      align-items: flex-start;
      flex-direction: column;
      gap: 24px;
      padding-bottom: 30px;
    }

    .shelf-visual {
      width: 100%;
      min-width: 0;
      height: 138px;
      justify-content: flex-start;
      padding-left: 4px;
    }

    .book.tall {
      height: 126px;
    }

    .book,
    .book.slim {
      height: 108px;
    }

    .book.brass {
      height: 96px;
    }

    .book.wide {
      height: 86px;
    }

    .section-heading {
      align-items: flex-start;
      flex-direction: column;
    }

    .module-card {
      grid-template-columns: 50px minmax(0, 1fr);
      min-height: 128px;
      padding: 14px;
    }

    .module-icon {
      min-width: 50px;
      height: 64px;
    }
  }
</style>
