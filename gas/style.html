<style>
  :root {
    color-scheme: light;
    --bg: #f7f8fb;
    --panel: #ffffff;
    --text: #1d2733;
    --muted: #657181;
    --line: #d9e0e7;
    --accent: #126a72;
    --accent-2: #b6423c;
    --soft: #eef5f6;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 12px;
    font: inherit;
    cursor: pointer;
  }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.68;
  }

  .topbar {
    min-height: 84px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }

  .eyebrow {
    margin: 0;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 0;
    font-size: 24px;
  }

  h2 {
    margin-bottom: 0;
    font-size: 16px;
  }

  .layout {
    max-width: 980px;
    margin: 0 auto;
    padding: 16px;
  }

  .module-list {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
  }

  .section-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .module-card {
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr);
    gap: 12px;
    width: 100%;
    text-align: left;
    margin-bottom: 10px;
    align-items: center;
  }

  .module-card:not(.disabled):hover {
    border-color: rgba(18, 106, 114, 0.45);
    background: var(--soft);
  }

  .module-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 42px;
    height: 42px;
    border-radius: 8px;
    background: var(--soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
  }

  .module-body {
    display: grid;
    gap: 4px;
  }

  .module-body strong {
    font-size: 15px;
  }

  .module-body span,
  .module-body em,
  .muted {
    color: var(--muted);
    font-size: 13px;
    font-style: normal;
  }

  .module-body em {
    color: var(--accent-2);
  }

  @media (max-width: 640px) {
    .topbar {
      align-items: flex-start;
      gap: 12px;
      flex-direction: column;
    }
  }
</style>
