<section class="study-grid" aria-label="737 Study Finder">
  <section>
    <h2>737 Study Finder</h2>
    <div class="toolbar">
      <select id="ataFilter">
        <option value="">ATA All</option>
        <option value="24">ATA 24</option>
      </select>
      <button id="loadQuestions">読込</button>
    </div>
    <div id="questionList" class="muted">初期設定後に問題を読み込めます。</div>
  </section>

  <section>
    <h2>Question</h2>
    <div id="questionDetail" class="muted">問題を選択してね。</div>
    <div class="toolbar">
      <button id="promptButton">回答作成用プロンプト</button>
    </div>
    <textarea id="promptOutput" placeholder="ここにプロンプトが出ます"></textarea>
  </section>

  <section>
    <h2>Candidate Pages</h2>
    <div id="candidateList" class="muted">候補ページはここに表示します。</div>
  </section>
</section>
