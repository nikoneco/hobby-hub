<style>
  :root {
    color-scheme: dark;
    --bg: #121212;
    --surface: #1e2320;
    --surface-2: #282420;
    --line: rgba(244, 214, 150, 0.26);
    --text: #f7f0e4;
    --muted: #c9c0b2;
    --accent: #f0b45a;
    --accent-2: #4fb1a8;
    --red: #9f3e44;
    --shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      linear-gradient(90deg, rgba(159, 62, 68, 0.18), transparent 28%, rgba(79, 177, 168, 0.14)),
      linear-gradient(180deg, #101111 0%, #151715 56%, #111312 100%);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button,
  input,
  select {
    font: inherit;
  }

  button,
  .map-button {
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
    transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
  }

  button:hover,
  .map-button:hover {
    transform: translateY(-1px);
    border-color: rgba(240, 180, 90, 0.72);
  }

  .topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    padding: 34px clamp(18px, 5vw, 64px) 26px;
    border-bottom: 1px solid var(--line);
    background:
      linear-gradient(135deg, rgba(18, 18, 18, 0.96), rgba(44, 32, 29, 0.92)),
      var(--surface);
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--accent-2);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 10px;
    font-size: clamp(38px, 7vw, 68px);
    line-height: 1;
  }

  h2 {
    margin-bottom: 0;
    font-size: 22px;
  }

  .lead {
    max-width: 620px;
    margin-bottom: 0;
    color: var(--muted);
    line-height: 1.7;
  }

  .status-panel {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: min(100%, 310px);
    justify-content: flex-end;
  }

  .status-panel span:first-child {
    color: var(--muted);
    font-size: 13px;
  }

  .secondary-button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 42px;
    background: rgba(79, 177, 168, 0.14);
    padding: 9px 13px;
  }

  .app-shell {
    display: grid;
    grid-template-columns: minmax(280px, 410px) minmax(0, 1fr);
    gap: 18px;
    max-width: 1120px;
    margin: 0 auto;
    padding: 22px 18px 42px;
  }

  .search-builder,
  .result-panel {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(40, 36, 32, 0.94), rgba(26, 30, 27, 0.96));
    box-shadow: var(--shadow);
  }

  .search-builder {
    padding: 18px;
  }

  .result-panel {
    padding: 18px;
  }

  .section-heading {
    margin-bottom: 16px;
  }

  .field {
    display: grid;
    gap: 7px;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  input,
  select {
    width: 100%;
    min-height: 44px;
    border: 1px solid rgba(247, 240, 228, 0.16);
    border-radius: 6px;
    background: rgba(8, 9, 9, 0.44);
    color: var(--text);
    padding: 10px 12px;
  }

  input:focus,
  select:focus {
    border-color: rgba(79, 177, 168, 0.82);
    outline: 2px solid rgba(79, 177, 168, 0.22);
  }

  .control-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .chip-field {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 2px 0 0;
    padding: 0;
    border: 0;
  }

  .chip-field legend {
    width: 100%;
    margin-bottom: 8px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .chip-field label {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-height: 36px;
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 999px;
    background: rgba(247, 240, 228, 0.06);
    color: var(--text);
    padding: 7px 11px;
    font-size: 13px;
  }

  .chip-field input {
    width: 15px;
    min-height: 15px;
    accent-color: var(--accent);
  }

  .query-preview {
    min-height: 44px;
    margin-bottom: 14px;
    border-left: 4px solid var(--accent-2);
    background: rgba(79, 177, 168, 0.1);
    color: var(--text);
    padding: 11px 13px;
    line-height: 1.5;
  }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 12px;
  }

  .map-button {
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr);
    gap: 12px;
    align-items: center;
    min-height: 92px;
    background:
      linear-gradient(180deg, rgba(55, 48, 42, 0.98), rgba(29, 34, 31, 0.98));
    padding: 14px;
  }

  .button-icon {
    display: inline-grid;
    place-items: center;
    width: 42px;
    height: 42px;
    border-radius: 6px;
    background: linear-gradient(160deg, var(--red), #65303d);
    color: #fff5e6;
    font-weight: 900;
  }

  .map-button strong,
  .map-button em {
    display: block;
    min-width: 0;
  }

  .map-button strong {
    margin-bottom: 6px;
    font-size: 16px;
  }

  .map-button em {
    color: var(--muted);
    font-size: 12px;
    font-style: normal;
    line-height: 1.5;
    overflow-wrap: anywhere;
  }

  @media (max-width: 820px) {
    .topbar {
      align-items: flex-start;
      flex-direction: column;
    }

    .status-panel {
      justify-content: flex-start;
    }

    .app-shell {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 540px) {
    .control-grid {
      grid-template-columns: 1fr;
      gap: 0;
    }

    .status-panel {
      align-items: stretch;
      flex-direction: column;
      width: 100%;
    }

    .secondary-button {
      justify-content: center;
    }
  }
</style>
