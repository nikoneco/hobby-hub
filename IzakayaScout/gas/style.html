<style>
  :root {
    color-scheme: dark;
    --bg: #160f0d;
    --surface: #241816;
    --line: rgba(255, 219, 166, 0.24);
    --text: #fff6e9;
    --muted: #d8c7b4;
    --accent: #f6b04c;
    --accent-2: #e85d4f;
    --red: #b9413b;
    --shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 10% 0%, rgba(232, 93, 79, 0.28), transparent 34%),
      linear-gradient(180deg, #170d0b 0%, #211512 48%, #140f0d 100%);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button,
  input,
  select {
    font: inherit;
  }

  .topbar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(18px, 5vw, 54px);
    min-height: 270px;
    padding: 34px clamp(18px, 5vw, 64px) 26px;
    border-bottom: 1px solid var(--line);
    background:
      radial-gradient(circle at 86% 34%, rgba(246, 176, 76, 0.18), transparent 28%),
      linear-gradient(135deg, rgba(31, 15, 12, 0.96), rgba(70, 35, 25, 0.9)),
      var(--surface);
    overflow: hidden;
  }

  .topbar::after {
    content: "";
    position: absolute;
    inset: auto 0 0;
    height: 8px;
    background: linear-gradient(90deg, transparent, rgba(246, 176, 76, 0.74), transparent);
    opacity: 0.78;
  }

  .topbar-copy {
    position: relative;
    z-index: 1;
    max-width: 620px;
  }

  .scout-visual {
    position: relative;
    z-index: 1;
    display: grid;
    place-items: center;
    flex: 0 0 min(32vw, 270px);
    min-width: 220px;
  }

  .scout-visual::before {
    content: "";
    position: absolute;
    inset: 7% -4% 3% 3%;
    border-radius: 999px;
    background:
      radial-gradient(circle at 60% 72%, rgba(74, 150, 228, 0.26), transparent 34%),
      radial-gradient(circle at 52% 42%, rgba(246, 176, 76, 0.22), transparent 58%);
    filter: blur(18px);
    opacity: 0.84;
  }

  .scout-mascot-frame {
    position: relative;
    z-index: 1;
    width: min(100%, 254px);
    aspect-ratio: 2 / 3;
    overflow: hidden;
    border: 1px solid rgba(255, 219, 166, 0.4);
    border-radius: 8px;
    background: rgba(10, 8, 7, 0.34);
    box-shadow:
      0 22px 48px rgba(0, 0, 0, 0.42),
      0 0 34px rgba(246, 176, 76, 0.12),
      inset 0 0 0 1px rgba(255, 246, 220, 0.08);
  }

  .scout-mascot-frame::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.12), transparent 16%, transparent 82%, rgba(255, 255, 255, 0.05)),
      linear-gradient(180deg, rgba(246, 176, 76, 0.12), transparent 24%, rgba(0, 0, 0, 0.18));
  }

  .scout-mascot-image {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 52% 46%;
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 10px;
    font-size: clamp(38px, 7vw, 68px);
    line-height: 1;
  }

  h2 {
    margin-bottom: 0;
    font-size: 22px;
  }

  .lead {
    max-width: 620px;
    margin-bottom: 0;
    color: var(--muted);
    line-height: 1.7;
  }

  .app-shell {
    display: grid;
    grid-template-columns: minmax(280px, 410px) minmax(0, 1fr);
    gap: 18px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 18px 42px;
  }

  .search-builder,
  .result-panel {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(45, 28, 23, 0.96), rgba(29, 22, 19, 0.98));
    box-shadow: var(--shadow);
  }

  .search-builder,
  .result-panel {
    padding: 18px;
  }

  .section-heading {
    margin-bottom: 16px;
  }

  .field {
    display: grid;
    gap: 7px;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .field em {
    color: var(--muted);
    font-size: 12px;
    font-style: normal;
    font-weight: 500;
  }

  input,
  select {
    width: 100%;
    min-height: 44px;
    border: 1px solid rgba(247, 240, 228, 0.16);
    border-radius: 6px;
    background: rgba(8, 9, 9, 0.44);
    color: var(--text);
    padding: 10px 12px;
  }

  input:focus,
  select:focus {
    border-color: rgba(79, 177, 168, 0.82);
    outline: 2px solid rgba(79, 177, 168, 0.22);
  }

  .chip-field,
  .choice-field {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 2px 0 16px;
    padding: 0;
    border: 0;
  }

  .chip-field:last-of-type,
  .choice-field:last-of-type {
    margin-bottom: 16px;
  }

  .chip-field legend,
  .choice-field legend {
    width: 100%;
    margin-bottom: 8px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .chip-field label,
  .choice-field label {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-height: 36px;
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 999px;
    background: rgba(247, 240, 228, 0.06);
    color: var(--text);
    padding: 7px 11px;
    font-size: 13px;
  }

  .chip-field input,
  .choice-field input {
    width: 15px;
    min-height: 15px;
    accent-color: var(--accent);
  }

  .primary-button {
    width: 100%;
    min-height: 46px;
    border: 1px solid rgba(240, 180, 90, 0.72);
    border-radius: 6px;
    background: linear-gradient(180deg, #ffbf60, #c6533c);
    color: #1a120d;
    cursor: pointer;
    font-weight: 800;
  }

  .primary-button:disabled {
    cursor: wait;
    opacity: 0.7;
  }

  .notice,
  .query-preview,
  .empty {
    margin-bottom: 14px;
    border-left: 4px solid var(--accent-2);
    background: rgba(79, 177, 168, 0.1);
    color: var(--text);
    padding: 11px 13px;
    line-height: 1.5;
  }

  .notice {
    border-left-color: var(--accent);
    background: rgba(240, 180, 90, 0.1);
  }

  .hidden {
    display: none;
  }

  .decision-panel {
    display: grid;
    gap: 12px;
    margin-bottom: 14px;
    border: 1px solid rgba(246, 176, 76, 0.34);
    border-radius: 8px;
    background:
      linear-gradient(135deg, rgba(246, 176, 76, 0.16), rgba(232, 93, 79, 0.13)),
      rgba(18, 15, 13, 0.76);
    padding: 14px;
  }

  .decision-panel.hidden,
  .keep-tray.hidden {
    display: none;
  }

  .decision-copy h3 {
    margin-bottom: 6px;
    font-size: 21px;
    overflow-wrap: anywhere;
  }

  .decision-copy p:last-child {
    margin-bottom: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  .decision-actions,
  .shop-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .decision-actions a,
  .decision-actions button,
  .card-action,
  .shop-link {
    display: inline-flex;
    min-height: 36px;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(240, 180, 90, 0.72);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 11px;
    text-decoration: none;
  }

  .decision-actions button,
  .card-action {
    background: rgba(247, 240, 228, 0.06);
    cursor: pointer;
  }

  .decide-action {
    background: linear-gradient(180deg, #ffbf60, #c6533c);
    color: #1a120d;
    font-weight: 900;
  }

  .keep-tray {
    display: grid;
    gap: 9px;
    margin-bottom: 14px;
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 8px;
    background: rgba(247, 240, 228, 0.05);
    padding: 12px;
  }

  .keep-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .keep-heading em {
    font-style: normal;
  }

  .keep-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .keep-chip {
    display: inline-flex;
    max-width: 100%;
    min-height: 34px;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(246, 176, 76, 0.28);
    border-radius: 999px;
    background: rgba(246, 176, 76, 0.1);
    color: var(--text);
    cursor: pointer;
    padding: 6px 10px;
  }

  .keep-chip span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .keep-chip em {
    color: var(--accent);
    font-size: 11px;
    font-style: normal;
    font-weight: 800;
  }

  .result-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .result-count {
    color: var(--muted);
    font-size: 13px;
  }

  .shop-list {
    display: grid;
    gap: 14px;
  }

  .shop-card {
    position: relative;
    display: grid;
    grid-template-columns: 150px minmax(0, 1fr);
    gap: 14px;
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(61, 39, 30, 0.98), rgba(28, 22, 19, 0.98));
    padding: 14px;
    touch-action: pan-y;
    transition: transform 180ms ease, opacity 180ms ease, border-color 180ms ease;
  }

  .shop-card.is-dragging {
    cursor: grabbing;
    transition: none;
  }

  .shop-card.is-dismissing {
    pointer-events: none;
  }

  .dismiss-button {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 2;
    display: inline-grid;
    place-items: center;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(247, 240, 228, 0.16);
    border-radius: 999px;
    background: rgba(8, 9, 9, 0.5);
    color: var(--muted);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
  }

  .dismiss-button:hover {
    border-color: rgba(232, 93, 79, 0.7);
    background: rgba(232, 93, 79, 0.22);
    color: var(--text);
  }

  .shop-photo {
    min-height: 126px;
    overflow: hidden;
    border-radius: 6px;
    background: rgba(247, 240, 228, 0.06);
  }

  .shop-photo img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-placeholder {
    display: grid;
    place-items: center;
    min-height: 126px;
    color: var(--muted);
    font-weight: 900;
  }

  .shop-body {
    min-width: 0;
  }

  .shop-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 8px;
  }

  .pick-line {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .pick-line span {
    border-radius: 4px;
    background: var(--accent-2);
    color: #fff7ef;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 900;
  }

  .pick-line em {
    color: var(--muted);
    font-size: 12px;
    font-style: normal;
  }

  .shop-meta span {
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 999px;
    color: var(--muted);
    padding: 4px 8px;
    font-size: 12px;
  }

  .shop-card h3 {
    margin-bottom: 8px;
    font-size: 20px;
    overflow-wrap: anywhere;
  }

  .catch {
    margin-bottom: 10px;
    color: var(--accent);
    line-height: 1.5;
  }

  .reason-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .reason-tags span {
    border: 1px solid rgba(246, 176, 76, 0.26);
    border-radius: 4px;
    background: rgba(246, 176, 76, 0.1);
    color: var(--text);
    padding: 4px 7px;
    font-size: 12px;
  }

  dl {
    display: grid;
    gap: 6px;
    margin: 0 0 12px;
  }

  dl div {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr);
    gap: 8px;
  }

  dt,
  dd {
    margin: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  dt {
    color: var(--muted);
  }

  dd {
    color: var(--text);
    overflow-wrap: anywhere;
  }

  dd a {
    color: var(--accent-2);
    text-decoration: none;
  }

  dd a:hover {
    text-decoration: underline;
  }

  .undo-toast {
    position: fixed;
    right: max(14px, env(safe-area-inset-right));
    bottom: max(14px, env(safe-area-inset-bottom));
    left: max(14px, env(safe-area-inset-left));
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    max-width: 560px;
    margin: 0 auto;
    border: 1px solid rgba(247, 240, 228, 0.2);
    border-radius: 8px;
    background: rgba(18, 15, 13, 0.94);
    box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42);
    color: var(--text);
    padding: 12px 12px 12px 14px;
  }

  .undo-toast.hidden {
    display: none;
  }

  .undo-toast span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
  }

  .undo-toast button {
    flex: 0 0 auto;
    min-height: 34px;
    border: 1px solid rgba(240, 180, 90, 0.72);
    border-radius: 6px;
    background: rgba(246, 176, 76, 0.14);
    color: var(--accent);
    cursor: pointer;
    padding: 6px 11px;
    font-weight: 800;
  }

  @media (max-width: 820px) {
    .topbar {
      align-items: flex-start;
      flex-direction: column;
      min-height: auto;
      padding-bottom: 28px;
    }

    .scout-visual {
      width: 100%;
      min-width: 0;
      flex-basis: auto;
      justify-items: start;
    }

    .scout-mascot-frame {
      width: min(58vw, 190px);
    }

    .app-shell,
    .shop-card {
      grid-template-columns: 1fr;
    }
  }
</style>
