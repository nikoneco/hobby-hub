<style>
  :root {
    color-scheme: dark;
    --bg: #160f0d;
    --surface: #241816;
    --line: rgba(255, 219, 166, 0.24);
    --text: #fff6e9;
    --muted: #d8c7b4;
    --accent: #f6b04c;
    --accent-2: #e85d4f;
    --red: #b9413b;
    --shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 10% 0%, rgba(232, 93, 79, 0.28), transparent 34%),
      linear-gradient(180deg, #170d0b 0%, #211512 48%, #140f0d 100%);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button,
  input,
  select {
    font: inherit;
  }

  .topbar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(18px, 5vw, 54px);
    min-height: 270px;
    padding: 34px clamp(18px, 5vw, 64px) 26px;
    border-bottom: 1px solid var(--line);
    background:
      radial-gradient(circle at 86% 34%, rgba(246, 176, 76, 0.18), transparent 28%),
      linear-gradient(135deg, rgba(31, 15, 12, 0.96), rgba(70, 35, 25, 0.9)),
      var(--surface);
    overflow: hidden;
  }

  .topbar::after {
    content: "";
    position: absolute;
    inset: auto 0 0;
    height: 8px;
    background: linear-gradient(90deg, transparent, rgba(246, 176, 76, 0.74), transparent);
    opacity: 0.78;
  }

  .topbar-copy {
    position: relative;
    z-index: 1;
    max-width: 620px;
  }

  .scout-visual {
    position: relative;
    z-index: 1;
    display: grid;
    place-items: center;
    flex: 0 0 min(32vw, 270px);
    min-width: 220px;
  }

  .scout-visual::before {
    content: "";
    position: absolute;
    inset: 7% -4% 3% 3%;
    border-radius: 999px;
    background:
      radial-gradient(circle at 60% 72%, rgba(74, 150, 228, 0.26), transparent 34%),
      radial-gradient(circle at 52% 42%, rgba(246, 176, 76, 0.22), transparent 58%);
    filter: blur(18px);
    opacity: 0.84;
  }

  .scout-mascot-frame {
    position: relative;
    z-index: 1;
    width: min(100%, 254px);
    aspect-ratio: 2 / 3;
    overflow: hidden;
    border: 1px solid rgba(255, 219, 166, 0.4);
    border-radius: 8px;
    background: rgba(10, 8, 7, 0.34);
    box-shadow:
      0 22px 48px rgba(0, 0, 0, 0.42),
      0 0 34px rgba(246, 176, 76, 0.12),
      inset 0 0 0 1px rgba(255, 246, 220, 0.08);
  }

  .scout-mascot-frame::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.12), transparent 16%, transparent 82%, rgba(255, 255, 255, 0.05)),
      linear-gradient(180deg, rgba(246, 176, 76, 0.12), transparent 24%, rgba(0, 0, 0, 0.18));
  }

  .scout-mascot-image {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 52% 46%;
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 10px;
    font-size: clamp(38px, 7vw, 68px);
    line-height: 1;
  }

  h2 {
    margin-bottom: 0;
    font-size: 22px;
  }

  .lead {
    max-width: 620px;
    margin-bottom: 0;
    color: var(--muted);
    line-height: 1.7;
  }

  .app-shell {
    display: grid;
    grid-template-columns: minmax(280px, 410px) minmax(0, 1fr);
    gap: 18px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 18px 42px;
  }

  .search-builder,
  .result-panel {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(45, 28, 23, 0.96), rgba(29, 22, 19, 0.98));
    box-shadow: var(--shadow);
  }

  .search-builder,
  .result-panel {
    padding: 18px;
  }

  .section-heading {
    margin-bottom: 16px;
  }

  .field {
    display: grid;
    gap: 7px;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .field em {
    color: var(--muted);
    font-size: 12px;
    font-style: normal;
    font-weight: 500;
  }

  .recent-area-list {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 7px;
    margin: -4px 0 16px;
  }

  .recent-area-list span {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .recent-area-list button {
    min-height: 30px;
    border: 1px solid rgba(79, 177, 168, 0.28);
    border-radius: 999px;
    background: rgba(79, 177, 168, 0.08);
    color: var(--text);
    cursor: pointer;
    padding: 5px 9px;
    font-size: 12px;
    font-weight: 800;
  }

  .recent-area-list button:hover {
    border-color: rgba(79, 177, 168, 0.62);
    background: rgba(79, 177, 168, 0.14);
  }

  input,
  select {
    width: 100%;
    min-height: 44px;
    border: 1px solid rgba(247, 240, 228, 0.16);
    border-radius: 6px;
    background: rgba(8, 9, 9, 0.44);
    color: var(--text);
    padding: 10px 12px;
  }

  input:focus,
  select:focus {
    border-color: rgba(79, 177, 168, 0.82);
    outline: 2px solid rgba(79, 177, 168, 0.22);
  }

  .chip-field,
  .choice-field {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 2px 0 16px;
    padding: 0;
    border: 0;
  }

  .chip-field:last-of-type,
  .choice-field:last-of-type {
    margin-bottom: 16px;
  }

  .choice-field {
    margin-bottom: 8px;
  }

  .chip-field legend,
  .choice-field legend {
    width: 100%;
    margin-bottom: 8px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .chip-field label,
  .choice-field label {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 42px;
    border: 1px solid rgba(247, 240, 228, 0.16);
    border-radius: 8px;
    background: rgba(247, 240, 228, 0.055);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 800;
    line-height: 1.2;
    overflow: hidden;
    padding: 9px 12px;
    text-align: center;
    transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, color 150ms ease;
  }

  .choice-field label {
    flex: 1 1 calc(50% - 4px);
  }

  .chip-field label {
    flex: 1 1 calc(50% - 4px);
  }

  .chip-field label::before,
  .choice-field label::before {
    content: "";
    flex: 0 0 auto;
    width: 9px;
    height: 9px;
    border: 1px solid rgba(247, 240, 228, 0.5);
    border-radius: 999px;
    background: rgba(8, 9, 9, 0.42);
    box-shadow: inset 0 0 0 2px rgba(8, 9, 9, 0.58);
  }

  .chip-field label:hover,
  .choice-field label:hover {
    border-color: rgba(240, 180, 90, 0.42);
    background: rgba(240, 180, 90, 0.09);
    transform: translateY(-1px);
  }

  .chip-field label:has(input:focus-visible),
  .choice-field label:has(input:focus-visible) {
    outline: 2px solid rgba(79, 177, 168, 0.34);
    outline-offset: 2px;
  }

  .chip-field label:has(input:checked),
  .choice-field label:has(input:checked) {
    border-color: rgba(240, 180, 90, 0.72);
    background:
      linear-gradient(180deg, rgba(240, 180, 90, 0.18), rgba(232, 93, 79, 0.12)),
      rgba(247, 240, 228, 0.07);
    color: #fff8eb;
    box-shadow: inset 0 0 0 1px rgba(240, 180, 90, 0.12);
  }

  .chip-field label:has(input:checked)::before,
  .choice-field label:has(input:checked)::before {
    border-color: rgba(255, 236, 196, 0.9);
    background: var(--accent);
  }

  .chip-field input,
  .choice-field input {
    position: absolute;
    inset: 0;
    width: 100%;
    min-height: 100%;
    margin: 0;
    cursor: pointer;
    opacity: 0;
  }

  .mood-shuffle-button {
    width: 100%;
    min-height: 38px;
    margin: 0 0 16px;
    border: 1px solid rgba(79, 177, 168, 0.34);
    border-radius: 8px;
    background: rgba(79, 177, 168, 0.1);
    color: #d8fff8;
    cursor: pointer;
    font-size: 13px;
    font-weight: 900;
    transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
  }

  .mood-shuffle-button:hover {
    border-color: rgba(79, 177, 168, 0.68);
    background: rgba(79, 177, 168, 0.16);
    transform: translateY(-1px);
  }

  .mood-shuffle-button.is-rolling {
    animation: moodRoll 340ms ease both;
  }

  .primary-button {
    width: 100%;
    min-height: 46px;
    border: 1px solid rgba(240, 180, 90, 0.72);
    border-radius: 6px;
    background: linear-gradient(180deg, #ffbf60, #c6533c);
    color: #1a120d;
    cursor: pointer;
    font-weight: 800;
  }

  .scout-brief {
    display: grid;
    gap: 9px;
    margin: 2px 0 14px;
    border: 1px solid rgba(79, 177, 168, 0.26);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(79, 177, 168, 0.12), rgba(247, 240, 228, 0.045)),
      rgba(8, 9, 9, 0.24);
    padding: 12px;
  }

  .scout-brief-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .scout-brief-head span {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .scout-brief-head strong {
    color: var(--accent);
    font-size: 13px;
  }

  .scout-brief-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .scout-brief-chips span {
    min-height: 26px;
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 999px;
    background: rgba(247, 240, 228, 0.06);
    color: var(--text);
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 800;
  }

  .scout-brief p {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
  }

  .primary-button:disabled {
    cursor: wait;
    opacity: 0.7;
  }

  .notice,
  .query-preview,
  .empty {
    margin-bottom: 14px;
    border-left: 4px solid var(--accent-2);
    background: rgba(79, 177, 168, 0.1);
    color: var(--text);
    padding: 11px 13px;
    line-height: 1.5;
  }

  .notice {
    border-left-color: var(--accent);
    background: rgba(240, 180, 90, 0.1);
  }

  .hidden {
    display: none;
  }

  .shop-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 2px;
  }

  .shop-link {
    display: inline-flex;
    min-height: 36px;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(240, 180, 90, 0.72);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 11px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 900;
  }

  .map-link {
    border-color: rgba(79, 177, 168, 0.68);
    background: rgba(79, 177, 168, 0.13);
    color: #d8fff8;
  }

  .tel-link {
    border-color: rgba(247, 240, 228, 0.28);
    background: rgba(247, 240, 228, 0.08);
  }

  .hp-link {
    color: var(--accent);
  }

  .result-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .result-tools {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 8px;
  }

  .rotate-button {
    min-height: 32px;
    border: 1px solid rgba(240, 180, 90, 0.58);
    border-radius: 999px;
    background: rgba(240, 180, 90, 0.12);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 800;
    padding: 0 12px;
    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, opacity 160ms ease;
  }

  .rotate-button:not(:disabled):hover {
    border-color: rgba(240, 180, 90, 0.86);
    background: rgba(240, 180, 90, 0.2);
    transform: translateY(-1px);
  }

  .rotate-button:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }

  .rotate-button.is-spinning {
    animation: rotateTap 340ms ease both;
  }

  .result-count {
    color: var(--muted);
    font-size: 13px;
  }

  .shop-list {
    display: grid;
    gap: 14px;
  }

  .loading-scout {
    display: grid;
    grid-template-columns: 46px minmax(0, 1fr);
    align-items: center;
    gap: 13px;
    border: 1px solid rgba(79, 177, 168, 0.28);
    border-radius: 8px;
    background: rgba(79, 177, 168, 0.08);
    padding: 14px;
  }

  .loading-scout strong {
    display: block;
    margin-bottom: 4px;
  }

  .loading-scout p {
    margin-bottom: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  .loading-bars {
    display: flex;
    align-items: end;
    justify-content: center;
    gap: 4px;
    min-height: 36px;
  }

  .loading-bars span {
    width: 7px;
    height: 16px;
    border-radius: 999px;
    background: var(--accent);
    animation: loadingPulse 780ms ease-in-out infinite;
  }

  .loading-bars span:nth-child(2) {
    animation-delay: 110ms;
  }

  .loading-bars span:nth-child(3) {
    animation-delay: 220ms;
  }

  .shop-card {
    position: relative;
    display: grid;
    grid-template-columns: 150px minmax(0, 1fr);
    gap: 14px;
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(61, 39, 30, 0.98), rgba(28, 22, 19, 0.98));
    padding: 14px;
    touch-action: pan-y;
    transition: transform 180ms ease, opacity 180ms ease, border-color 180ms ease;
    animation: dealIn 260ms ease both;
    animation-delay: calc(var(--card-index, 0) * 54ms);
  }

  .shop-card.is-dragging {
    animation: none;
    cursor: grabbing;
    transition: none;
  }

  .shop-card.is-swipe-ready {
    border-color: rgba(232, 93, 79, 0.72);
    box-shadow: 0 18px 42px rgba(232, 93, 79, 0.12);
  }

  .shop-card.is-dismissing {
    pointer-events: none;
  }

  .dismiss-button {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 2;
    display: inline-grid;
    place-items: center;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(247, 240, 228, 0.16);
    border-radius: 999px;
    background: rgba(8, 9, 9, 0.5);
    color: var(--muted);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
  }

  .dismiss-button:hover {
    border-color: rgba(232, 93, 79, 0.7);
    background: rgba(232, 93, 79, 0.22);
    color: var(--text);
  }

  .shop-card.is-swipe-ready .dismiss-button {
    border-color: rgba(232, 93, 79, 0.78);
    background: rgba(232, 93, 79, 0.28);
    color: var(--text);
  }

  .shop-photo {
    min-height: 126px;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 6px;
    background: rgba(247, 240, 228, 0.06);
  }

  .shop-photo img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-placeholder {
    display: grid;
    place-items: center;
    min-height: 126px;
    color: var(--muted);
    font-weight: 900;
  }

  .shop-body {
    min-width: 0;
  }

  .shop-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 8px;
  }

  .pick-line {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .pick-line span {
    border-radius: 4px;
    background: var(--accent-2);
    color: #fff7ef;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 900;
  }

  .pick-line em {
    color: var(--muted);
    font-size: 12px;
    font-style: normal;
  }

  .shop-meta span {
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 999px;
    color: var(--muted);
    padding: 4px 8px;
    font-size: 12px;
  }

  .shop-card h3 {
    margin-bottom: 8px;
    font-size: 20px;
    overflow-wrap: anywhere;
  }

  .catch {
    display: -webkit-box;
    margin-bottom: 10px;
    color: var(--accent);
    line-height: 1.5;
    overflow: hidden;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
  }

  .match-meter {
    display: grid;
    gap: 6px;
    margin: 0 0 10px;
    border: 1px solid rgba(247, 240, 228, 0.13);
    border-radius: 8px;
    background: rgba(8, 9, 9, 0.22);
    padding: 9px;
  }

  .match-meter-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .match-meter-head span,
  .match-meter em {
    color: var(--muted);
    font-size: 12px;
    font-style: normal;
    font-weight: 800;
  }

  .match-meter-head strong {
    color: var(--accent);
    font-size: 13px;
  }

  .match-track {
    height: 7px;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(247, 240, 228, 0.1);
  }

  .match-track i {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    transition: width 220ms ease;
  }

  .match-meter.is-full {
    border-color: rgba(79, 177, 168, 0.34);
    background: rgba(79, 177, 168, 0.1);
  }

  .match-meter.is-full .match-track i {
    background: linear-gradient(90deg, #4fb1a8, var(--accent));
  }

  .reason-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .condition-tags {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .condition-tags strong {
    border-radius: 4px;
    background: rgba(79, 177, 168, 0.18);
    color: #b9fff2;
    padding: 4px 7px;
    font-size: 11px;
    font-weight: 900;
  }

  .condition-tags span {
    border: 1px solid rgba(79, 177, 168, 0.34);
    border-radius: 999px;
    background: rgba(79, 177, 168, 0.12);
    color: var(--text);
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 800;
  }

  .reason-tags span {
    border: 1px solid rgba(246, 176, 76, 0.26);
    border-radius: 4px;
    background: rgba(246, 176, 76, 0.1);
    color: var(--text);
    padding: 4px 7px;
    font-size: 12px;
  }

  .glance-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .glance-row span {
    border: 1px solid rgba(79, 177, 168, 0.28);
    border-radius: 999px;
    background: rgba(79, 177, 168, 0.1);
    color: var(--text);
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 800;
  }

  .shop-details {
    margin-bottom: 12px;
  }

  .shop-details summary {
    display: inline-flex;
    min-height: 32px;
    align-items: center;
    border: 1px solid rgba(247, 240, 228, 0.14);
    border-radius: 999px;
    color: var(--muted);
    cursor: pointer;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 800;
    list-style: none;
  }

  .shop-details summary::-webkit-details-marker {
    display: none;
  }

  .shop-details[open] summary {
    margin-bottom: 10px;
    border-color: rgba(246, 176, 76, 0.38);
    color: var(--accent);
  }

  dl {
    display: grid;
    gap: 6px;
    margin: 0;
  }

  dl div {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr);
    gap: 8px;
  }

  dt,
  dd {
    margin: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  dt {
    color: var(--muted);
  }

  dd {
    color: var(--text);
    overflow-wrap: anywhere;
  }

  dd a {
    color: var(--accent-2);
    text-decoration: none;
  }

  dd a:hover {
    text-decoration: underline;
  }

  .undo-toast {
    position: fixed;
    right: max(14px, env(safe-area-inset-right));
    bottom: max(14px, env(safe-area-inset-bottom));
    left: max(14px, env(safe-area-inset-left));
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    max-width: 560px;
