<script>
  const app = document.getElementById('app');
  const bootstrap = JSON.parse(app.dataset.bootstrap || '{}');
  const storageKey = 'izakayaScout.preferences.v2';
  const state = {
    preferences: loadPreferences(),
    searching: false,
    visibleShops: [],
    backupShops: [],
    keptShops: [],
    selectedShop: null,
    lastResultMeta: null,
    lastDismissed: null,
    undoTimer: null
  };

  const moodLabels = {
    safe: '無難にうまい',
    cheap: '安く飲む',
    second: '二軒目',
    quiet: '静かめ',
    bar: 'バー寄り'
  };

  const elements = {
    areaInput: document.getElementById('areaInput'),
    smokingSelect: document.getElementById('smokingSelect'),
    setupNotice: document.getElementById('setupNotice'),
    searchButton: document.getElementById('searchButton'),
    queryPreview: document.getElementById('queryPreview'),
    decisionPanel: document.getElementById('decisionPanel'),
    keepTray: document.getElementById('keepTray'),
    resultCount: document.getElementById('resultCount'),
    resultList: document.getElementById('resultList'),
    undoToast: document.getElementById('undoToast'),
    undoMessage: document.getElementById('undoMessage'),
    undoButton: document.getElementById('undoButton')
  };

  function init() {
    applySavedPreferences();
    renderSetupNotice();
    bindEvents();
    renderPreview();
  }

  function bindEvents() {
    elements.areaInput.addEventListener('input', handlePreferenceChange);
    elements.smokingSelect.addEventListener('change', handlePreferenceChange);
    document.querySelectorAll('input[name="mood"], .chip-field input[type="checkbox"]').forEach((input) => {
      input.addEventListener('change', handlePreferenceChange);
    });
    elements.searchButton.addEventListener('click', search);
    elements.undoButton.addEventListener('click', undoLastDismiss);
  }

  function applySavedPreferences() {
    const defaults = bootstrap.defaults || {};
    elements.areaInput.value = state.preferences.areaText || defaults.AREA_TEXT || '';
    elements.smokingSelect.value = state.preferences.smokingPreference || defaults.SMOKING_PREFERENCE || '';

    const mood = state.preferences.mood || defaults.MOOD || 'safe';
    const moodInput = document.querySelector('input[name="mood"][value="' + cssEscape(mood) + '"]');
    if (moodInput) {
      moodInput.checked = true;
    }

    const checked = new Set(state.preferences.mustValues || state.preferences.checkedValues || []);
    document.querySelectorAll('.chip-field input[type="checkbox"]').forEach((input) => {
      input.checked = checked.has(input.value);
    });
  }

  function handlePreferenceChange() {
    state.preferences = collectPreferences();
    savePreferences(state.preferences);
    renderPreview();
  }

  function collectPreferences() {
    const mustInputs = Array.from(document.querySelectorAll('.chip-field input[type="checkbox"]:checked'));
    const mustValues = mustInputs.map((input) => input.value);
    const features = {};
    if (mustValues.includes('card')) features.card = true;
    if (mustValues.includes('privateRoom')) features.privateRoom = true;
    if (mustValues.includes('midnight')) features.midnight = true;
    if (mustValues.includes('openNow')) features.openNow = true;

    const mood = getSelectedMood();
    const smokingPreference = elements.smokingSelect.value;

    return {
      areaText: elements.areaInput.value.trim(),
      mood,
      moodLabel: moodLabels[mood] || '',
      walkMinutesLimit: mustValues.includes('walk5') ? '5' : '',
      walkLabel: mustValues.includes('walk5') ? '徒歩5分以内' : '',
      smokingPreference,
      smokingLabel: getSelectedSmokingLabel(),
      features,
      mustValues
    };
  }

  function renderSetupNotice() {
    const setup = bootstrap.setup || {};
    if (setup.hasApiKey) {
      elements.setupNotice.classList.add('hidden');
      return;
    }
    elements.setupNotice.classList.remove('hidden');
    elements.setupNotice.textContent = 'Script Propertiesに HOTPEPPER_API_KEY を設定すると検索できます。';
  }

  function renderPreview() {
    const preferences = collectPreferences();
    const query = [
      preferences.areaText,
      preferences.moodLabel,
      preferences.walkLabel,
      preferences.smokingLabel,
      ...formatMustLabels(preferences.mustValues)
    ].filter(Boolean).join(' / ');
    elements.queryPreview.textContent = query || '場所と気分を入れて候補を出します。';
  }

  function getSelectedMood() {
    const input = document.querySelector('input[name="mood"]:checked');
    return input ? input.value : 'safe';
  }

  function getSelectedSmokingLabel() {
    if (!elements.smokingSelect.value) {
      return '';
    }
    const option = elements.smokingSelect.options[elements.smokingSelect.selectedIndex];
    return option ? option.textContent.trim() : '';
  }

  function formatMustLabels(values) {
    const labels = {
      card: 'カード可',
      privateRoom: '個室',
      midnight: '深夜',
      openNow: '営業中'
    };
    return values.filter((value) => value !== 'walk5').map((value) => labels[value] || '');
  }

  function search() {
    const payload = collectPreferences();
    if (!payload.areaText) {
      showError('駅名・地名を入力してね。');
      elements.areaInput.focus();
      return;
    }

    setSearching(true);
    google.script.run
      .withSuccessHandler((response) => {
        setSearching(false);
        renderResults(unwrap(response));
      })
      .withFailureHandler((error) => {
        setSearching(false);
        showError(error.message || String(error));
      })
      .apiSearchShops(payload);
  }

  function renderResults(data) {
    state.lastResultMeta = data;
    state.visibleShops = (data.shops || []).slice();
    state.backupShops = (data.backupShops || []).slice();
    state.keptShops = [];
    state.selectedShop = null;
    state.lastDismissed = null;
    hideUndoToast();
    elements.queryPreview.textContent = data.query || '';
    renderDecisionPanel();
    renderKeepTray();
    renderShopList();
    refreshResultCount();
  }

  function renderShopList() {
    const shops = state.visibleShops;
    elements.resultList.innerHTML = '';

    if (!shops.length) {
      elements.resultList.innerHTML = '<p class="empty">条件に合う候補がありません。</p>';
      return;
    }

    shops.forEach((shop, index) => {
      const card = renderShopCard(shop, index);
      elements.resultList.appendChild(card);
    });
  }

  function renderShopCard(shop, index) {
    const card = document.createElement('article');
    card.className = 'shop-card';
    card.dataset.shopId = shop.id || '';
    const photo = shop.photo
      ? '<img src="' + escapeHtml(shop.photo) + '" alt="">'
      : '<div class="photo-placeholder">HP</div>';
    const url = shop.urls && shop.urls.pc ? shop.urls.pc : '';
    card.innerHTML = [
      '<button class="dismiss-button" type="button" aria-label="この店を候補から外す" title="この店を候補から外す">×</button>',
      '<div class="shop-photo">' + photo + '</div>',
      '<div class="shop-body">',
      '<div class="pick-line"><span>' + escapeHtml(formatPickLabel(index)) + '</span><em>' + escapeHtml(shop.pickReason || '') + '</em></div>',
      '<div class="shop-meta"><span>' + escapeHtml(shop.genre || 'ジャンル未設定') + '</span><span>' + escapeHtml(shop.budget || '予算未設定') + '</span></div>',
      '<h3>' + escapeHtml(shop.name || '名称未設定') + '</h3>',
      renderReasonTags(shop.reasonTags),
      shop.catchText ? '<p class="catch">' + escapeHtml(shop.catchText) + '</p>' : '',
      '<dl>',
      detailRow('最寄り', shop.station || ''),
      detailRow('アクセス', shop.access || ''),
      detailRow('徒歩目安', formatWalkMinutes(shop.walkMinutes)),
      detailRow('住所', shop.address || '', shop.mapsUrl || ''),
      detailRow('禁煙・喫煙', shop.nonSmoking || ''),
      detailRow('カード', shop.card || ''),
      detailRow('対応カード', formatCreditCards(shop.creditCards)),
      detailRow('営業状態', shop.openNow ? '営業中' : ''),
      detailRow('営業時間', shop.open || ''),
      detailRow('定休日', shop.close || ''),
      '</dl>',
      '<div class="shop-actions">',
      '<button class="card-action decide-action" type="button">ここにする</button>',
      '<button class="card-action keep-action" type="button">' + escapeHtml(isKept(shop.id) ? 'キープ中' : 'キープ') + '</button>',
      url ? '<a class="shop-link" href="' + escapeHtml(url) + '" target="_blank" rel="noopener">Hot Pepperで開く</a>' : '',
      '</div>',
      '</div>'
    ].join('');
    card.querySelector('.dismiss-button').addEventListener('click', () => dismissShop(shop.id, card));
    card.querySelector('.decide-action').addEventListener('click', () => decideShop(shop));
    card.querySelector('.keep-action').addEventListener('click', () => keepShop(shop));
    bindSwipeDismiss(card, shop);
    return card;
  }

  function bindSwipeDismiss(card, shop) {
    let startX = 0;
    let startY = 0;
    let dragging = false;

    card.addEventListener('pointerdown', (event) => {
      if (event.target.closest('a, button')) {
        return;
      }
      startX = event.clientX;
      startY = event.clientY;
      dragging = true;
      card.classList.add('is-dragging');
      card.setPointerCapture(event.pointerId);
    });

    card.addEventListener('pointermove', (event) => {
      if (!dragging) {
        return;
      }
      const deltaX = event.clientX - startX;
      const deltaY = event.clientY - startY;
      if (Math.abs(deltaX) < 8 || Math.abs(deltaY) > 96) {
        return;
      }
      const limitedX = Math.min(28, Math.max(-150, deltaX));
      card.style.transform = 'translateX(' + limitedX + 'px) rotate(' + (limitedX / 38) + 'deg)';
      card.style.opacity = String(Math.max(0.42, 1 - Math.abs(limitedX) / 210));
    });

    card.addEventListener('pointerup', (event) => {
      if (!dragging) {
        return;
      }
      dragging = false;
      card.classList.remove('is-dragging');
      const deltaX = event.clientX - startX;
      const deltaY = event.clientY - startY;
      if (deltaX < -90 && Math.abs(deltaY) < 96) {
        dismissShop(shop.id, card);
        return;
      }
      resetCardPosition(card);
    });

    card.addEventListener('pointercancel', () => {
      dragging = false;
      card.classList.remove('is-dragging');
      resetCardPosition(card);
    });
  }

  function dismissShop(shopId, card) {
    if (!shopId) {
      return;
    }
    if (card) {
      card.classList.add('is-dismissing');
      card.style.transform = 'translateX(-120%) rotate(-5deg)';
      card.style.opacity = '0';
      setTimeout(() => replaceDismissedShop(shopId), 180);
      return;
    }
    replaceDismissedShop(shopId);
  }

  function replaceDismissedShop(shopId) {
    const dismissedIndex = state.visibleShops.findIndex((shop) => shop.id === shopId);
    const dismissedShop = state.visibleShops[dismissedIndex];
    if (!dismissedShop) {
      return;
    }
    const wasKept = isKept(shopId);
    const wasSelected = state.selectedShop && state.selectedShop.id === shopId;
    state.visibleShops = state.visibleShops.filter((shop) => shop.id !== shopId);
    state.keptShops = state.keptShops.filter((shop) => shop.id !== shopId);
    if (state.selectedShop && state.selectedShop.id === shopId) {
      state.selectedShop = null;
    }
    const replacement = state.backupShops.shift();
    if (replacement) {
      state.visibleShops.push(replacement);
    }
    state.lastDismissed = {
      shop: dismissedShop,
      index: dismissedIndex,
      replacement: replacement || null,
      wasKept: wasKept,
      wasSelected: Boolean(wasSelected)
    };
    renderShopList();
    renderKeepTray();
    renderDecisionPanel();
    refreshResultCount();
    showUndoToast(dismissedShop);
    vibrate(12);
  }

  function undoLastDismiss() {
    const record = state.lastDismissed;
    if (!record || !record.shop) {
      hideUndoToast();
      return;
    }
    if (record.replacement) {
      state.visibleShops = state.visibleShops.filter((shop) => shop.id !== record.replacement.id);
      state.backupShops.unshift(record.replacement);
    }
    const insertAt = Math.max(0, Math.min(record.index, state.visibleShops.length));
    state.visibleShops.splice(insertAt, 0, record.shop);
    if (record.wasKept && !isKept(record.shop.id)) {
      state.keptShops.push(record.shop);
    }
    if (record.wasSelected) {
      state.selectedShop = record.shop;
    }
    state.lastDismissed = null;
    hideUndoToast();
    renderShopList();
    renderKeepTray();
    renderDecisionPanel();
    refreshResultCount();
    vibrate(10);
  }

  function keepShop(shop) {
    if (!shop || !shop.id) {
      return;
    }
    if (!isKept(shop.id)) {
      state.keptShops.push(shop);
    }
    renderShopList();
    renderKeepTray();
    showActionToast('キープしました: ' + (shop.name || '名称未設定'));
    vibrate(8);
  }

  function removeKeptShop(shopId) {
    state.keptShops = state.keptShops.filter((shop) => shop.id !== shopId);
    renderShopList();
    renderKeepTray();
  }

  function isKept(shopId) {
    return state.keptShops.some((shop) => shop.id === shopId);
  }

  function decideShop(shop) {
    if (!shop || !shop.id) {
      return;
    }
    state.selectedShop = shop;
    renderDecisionPanel();
    showActionToast('今日の一軒にしました: ' + (shop.name || '名称未設定'));
    if (elements.decisionPanel.scrollIntoView) {
      elements.decisionPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    vibrate(18);
  }

  function clearDecision() {
    state.selectedShop = null;
    renderDecisionPanel();
  }

  function renderKeepTray() {
    if (!state.keptShops.length) {
      elements.keepTray.classList.add('hidden');
      elements.keepTray.innerHTML = '';
      return;
    }

    elements.keepTray.classList.remove('hidden');
    elements.keepTray.innerHTML = [
      '<div class="keep-heading"><span>キープ中</span><em>' + state.keptShops.length + '件</em></div>',
      '<div class="keep-list">',
      state.keptShops.map((shop) => [
        '<button class="keep-chip" type="button" data-shop-id="' + escapeHtml(shop.id) + '">',
        '<span>' + escapeHtml(shop.name || '名称未設定') + '</span>',
        '<em>外す</em>',
        '</button>'
      ].join('')).join(''),
      '</div>'
    ].join('');

    elements.keepTray.querySelectorAll('.keep-chip').forEach((button) => {
      button.addEventListener('click', () => removeKeptShop(button.dataset.shopId || ''));
    });
  }

  function renderDecisionPanel() {
    const shop = state.selectedShop;
    if (!shop) {
      elements.decisionPanel.classList.add('hidden');
      elements.decisionPanel.innerHTML = '';
      return;
    }

    const hotPepperUrl = shop.urls && shop.urls.pc ? shop.urls.pc : '';
    elements.decisionPanel.classList.remove('hidden');
    elements.decisionPanel.innerHTML = [
      '<div class="decision-copy">',
      '<p class="eyebrow">Tonight Decision</p>',
      '<h3>' + escapeHtml(shop.name || '名称未設定') + '</h3>',
      '<p>' + escapeHtml(buildDecisionSummary(shop)) + '</p>',
      '</div>',
      '<div class="decision-actions">',
      shop.mapsUrl ? '<a href="' + escapeHtml(shop.mapsUrl) + '" target="_blank" rel="noopener">Google Maps</a>' : '',
      hotPepperUrl ? '<a href="' + escapeHtml(hotPepperUrl) + '" target="_blank" rel="noopener">Hot Pepper</a>' : '',
      '<button id="clearDecisionButton" type="button">選び直す</button>',
      '</div>'
    ].join('');

    const clearButton = document.getElementById('clearDecisionButton');
    if (clearButton) {
      clearButton.addEventListener('click', clearDecision);
    }
  }

  function buildDecisionSummary(shop) {
    return [
      shop.pickReason,
      shop.genre,
      shop.budget,
      formatWalkMinutes(shop.walkMinutes),
      shop.station ? shop.station + '駅' : ''
    ].filter(Boolean).slice(0, 4).join(' / ');
  }

  function showUndoToast(shop) {
    clearUndoTimer();
    elements.undoMessage.textContent = '候補から外しました: ' + (shop.name || '名称未設定');
    elements.undoToast.classList.remove('hidden');
    state.undoTimer = setTimeout(() => {
      state.lastDismissed = null;
      hideUndoToast();
    }, 5200);
  }

  function hideUndoToast() {
    clearUndoTimer();
    elements.undoToast.classList.add('hidden');
    elements.undoMessage.textContent = '';
  }

  function showActionToast(message) {
    clearUndoTimer();
    state.lastDismissed = null;
    elements.undoMessage.textContent = message;
    elements.undoToast.classList.remove('hidden');
    state.undoTimer = setTimeout(hideUndoToast, 3200);
  }

  function clearUndoTimer() {
    if (state.undoTimer) {
      clearTimeout(state.undoTimer);
      state.undoTimer = null;
    }
  }

  function vibrate(duration) {
    if (window.navigator && typeof window.navigator.vibrate === 'function') {
      window.navigator.vibrate(duration);
    }
  }

  function resetCardPosition(card) {
    card.style.transform = '';
    card.style.opacity = '';
  }

  function formatPickLabel(index) {
    return ['本命', '対抗', '穴場'][index] || '候補';
  }

  function renderReasonTags(tags) {
    if (!Array.isArray(tags) || !tags.length) {
      return '';
    }
    return '<div class="reason-tags">' + tags.map((tag) => '<span>' + escapeHtml(tag) + '</span>').join('') + '</div>';
  }

  function detailRow(label, value, href) {
    if (!value) {
      return '';
    }
    const body = href
      ? '<a href="' + escapeHtml(href) + '" target="_blank" rel="noopener">' + escapeHtml(value) + '</a>'
      : escapeHtml(value);
    return '<div><dt>' + escapeHtml(label) + '</dt><dd>' + body + '</dd></div>';
  }

  function formatResultCount(data, visibleCount) {
    const fetchedCount = Number(data.resultsFetched || visibleCount);
    const base = visibleCount + '件提案';
    const reserveCount = state.backupShops.length;
    if (reserveCount > 0) {
      return base + ' / 控え' + reserveCount + '件 / 取得' + fetchedCount + '件';
    }
    if (fetchedCount !== visibleCount) {
      return base + ' / 取得' + fetchedCount + '件 / 全' + data.resultsAvailable + '件';
    }
    return base + ' / 全' + data.resultsAvailable + '件';
  }

  function refreshResultCount() {
    elements.resultCount.textContent = formatResultCount(state.lastResultMeta || {}, state.visibleShops.length);
  }

  function formatCreditCards(creditCards) {
    return Array.isArray(creditCards) ? creditCards.join('、') : '';
  }

  function formatWalkMinutes(walkMinutes) {
    if (walkMinutes == null || walkMinutes === '') {
      return '';
    }
    return Number(walkMinutes) === 0 ? '1分未満' : '徒歩' + walkMinutes + '分';
  }

  function setSearching(searching) {
    state.searching = searching;
    elements.searchButton.disabled = searching;
    elements.searchButton.textContent = searching ? '選定中' : '候補を3つ出す';
  }

  function unwrap(response) {
    if (!response || !response.ok) {
      const message = response && response.error ? response.error.message : 'Unknown error';
      throw new Error(message);
    }
    return response.data;
  }

  function showError(message) {
    state.visibleShops = [];
    state.backupShops = [];
    state.keptShops = [];
    state.selectedShop = null;
    state.lastResultMeta = null;
    state.lastDismissed = null;
    hideUndoToast();
    renderKeepTray();
    renderDecisionPanel();
    elements.resultCount.textContent = 'エラー';
    elements.resultList.innerHTML = '<p class="empty">' + escapeHtml(message) + '</p>';
  }

  function loadPreferences() {
    try {
      return JSON.parse(localStorage.getItem(storageKey) || '{}');
    } catch (error) {
      return {};
    }
  }

  function savePreferences(preferences) {
    localStorage.setItem(storageKey, JSON.stringify(preferences));
  }

  function cssEscape(value) {
    if (window.CSS && CSS.escape) {
      return CSS.escape(value);
    }
    return String(value).replace(/"/g, '\\"');
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  init();
</script>
