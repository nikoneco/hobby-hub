            <button type="button" data-preset="bar">二軒目バー</button>
            <button id="randomPresetButton" class="preset-random-button" type="button">迷ったらおまかせ</button>
          </div>

          <fieldset class="choice-field">
            <legend>今日の気分</legend>
            <label><input type="radio" name="mood" value="safe" checked>無難にうまい</label>
            <label><input type="radio" name="mood" value="cheap">安く飲む</label>
            <label><input type="radio" name="mood" value="second">二軒目</label>
            <label><input type="radio" name="mood" value="quiet">静かめ</label>
            <label><input type="radio" name="mood" value="bar">バー寄り</label>
          </fieldset>
          <button id="moodShuffleButton" class="mood-shuffle-button" type="button">今夜の気分を振る</button>

          <fieldset class="food-field">
            <legend>食べたいもの</legend>
            <label><input type="checkbox" data-kind="food" value="焼き鳥">焼き鳥</label>
            <label><input type="checkbox" data-kind="food" value="海鮮">海鮮</label>
            <label><input type="checkbox" data-kind="food" value="肉">肉</label>
            <label><input type="checkbox" data-kind="food" value="串揚げ">串揚げ</label>
            <label><input type="checkbox" data-kind="food" value="おでん">おでん</label>
          </fieldset>

          <fieldset class="drink-field">
            <legend>飲みたいもの</legend>
            <label><input type="checkbox" data-kind="drink" value="sake">日本酒</label>
            <label><input type="checkbox" data-kind="drink" value="shochu">焼酎</label>
            <label><input type="checkbox" data-kind="drink" value="wine">ワイン</label>
            <label><input type="checkbox" data-kind="drink" value="cocktail">カクテル</label>
          </fieldset>

          <fieldset class="chip-field">
            <legend>ゆずれない条件</legend>
            <label><input type="checkbox" data-kind="must" value="walk5">徒歩5分以内</label>
            <label><input type="checkbox" data-kind="must" value="card">カード可</label>
            <label><input type="checkbox" data-kind="must" value="privateRoom">個室</label>
            <label><input type="checkbox" data-kind="must" value="midnight">深夜</label>
            <label><input type="checkbox" data-kind="must" value="openNow">営業中</label>
          </fieldset>

          <label class="field compact-field">
            <span>禁煙/喫煙</span>
            <select id="smokingSelect">
              <option value="" selected>指定なし</option>
              <option value="non_smoking">禁煙席あり</option>
              <option value="smoking_allowed">喫煙可</option>
              <option value="all_smoking">全席喫煙可</option>
              <option value="heated_tobacco">加熱式たばこ可</option>
            </select>
          </label>

          <div id="scoutBrief" class="scout-brief" aria-live="polite"></div>

          <button id="searchButton" class="primary-button" type="button">候補を3つ出す</button>
        </section>

        <section id="resultPanel" class="result-panel" aria-labelledby="resultsTitle">
          <div class="section-heading result-heading">
            <div>
              <p class="eyebrow">Tonight Picks</p>
              <h2 id="resultsTitle">候補</h2>
            </div>
            <div class="result-tools">
              <button id="rotateButton" class="rotate-button" type="button" aria-label="別の候補を出す" disabled>別案</button>
              <button id="shareButton" class="share-button" type="button" aria-label="候補を共有する" disabled>共有</button>
              <span id="resultCount" class="result-count">未検索</span>
            </div>
          </div>
          <div id="queryPreview" class="query-preview">場所と気分を入れて候補を出します。</div>
          <div id="resultList" class="shop-list"></div>
        </section>
      </main>
      <div id="actionToast" class="action-toast hidden" role="status" aria-live="polite">
        <span id="actionMessage"></span>
        <button id="actionUndoButton" class="toast-action hidden" type="button">元に戻す</button>
      </div>
    </div>
    <script src="./assets/js/gas-run-shim.js?v=20260708-hub-icon"></script>
    <script src="./assets/js/app.js?v=20260708-hub-icon"></script>
    <script src="./assets/js/pwa-client.js?v=20260708-hub-icon"></script>
  </body>
</html>
