<style>
  :root {
    color-scheme: light;
    --bg: #f7f8fb;
    --panel: #ffffff;
    --text: #1d2733;
    --muted: #657181;
    --line: #d9e0e7;
    --accent: #126a72;
    --accent-2: #b6423c;
    --soft: #eef5f6;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 12px;
    font: inherit;
    cursor: pointer;
  }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
  }

  .topbar {
    min-height: 84px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }

  .eyebrow {
    margin: 0;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 0;
    font-size: 24px;
  }

  h2 {
    font-size: 16px;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 16px;
    padding: 16px;
  }

  .module-list,
  .study-grid > section,
  .utility-grid > section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
  }

  .module-card {
    display: block;
    width: 100%;
    text-align: left;
    margin-bottom: 10px;
  }

  .module-card strong {
    display: block;
  }

  .module-card span,
  .muted {
    color: var(--muted);
    font-size: 13px;
  }

  .study-grid {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 300px minmax(0, 1fr) 360px;
    gap: 16px;
    min-width: 0;
  }

  .utility-grid {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 16px;
    min-width: 0;
    margin-top: 16px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  input,
  select,
  textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
    font: inherit;
  }

  textarea {
    min-height: 180px;
    resize: vertical;
  }

  label {
    display: block;
    margin-bottom: 10px;
    color: var(--muted);
    font-size: 13px;
  }

  .question-button {
    width: 100%;
    display: block;
    text-align: left;
    margin-bottom: 8px;
  }

  .question-list.is-collapsed {
    display: none;
  }

  .candidate {
    border-top: 1px solid var(--line);
    padding: 10px 0;
  }

  .candidate:first-child {
    border-top: 0;
  }

  .candidate-code {
    color: var(--accent-2);
    font-weight: 700;
  }

  .answer-editor {
    margin-top: 0;
  }

  .import-panel {
    margin-top: 0;
  }

  .check-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .check-label input {
    width: auto;
  }

  .answer-card {
    border: 1px solid var(--line);
    border-radius: 8px;
    margin: 10px 0;
    padding: 10px;
    background: #fbfcfd;
  }

  .answer-card.confirmed {
    border-color: rgba(18, 106, 114, 0.35);
    background: var(--soft);
  }

  .answer-card summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    font-weight: 700;
  }

  .answer-meta {
    color: var(--muted);
    font-size: 12px;
    margin: 8px 0;
  }

  pre {
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    font-family: inherit;
    line-height: 1.5;
  }

  .status {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: var(--soft);
    color: var(--accent);
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 700;
  }

  @media (max-width: 980px) {
    .layout,
    .study-grid,
    .utility-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
